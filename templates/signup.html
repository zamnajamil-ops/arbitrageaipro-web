<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — ArbitrageAI Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;flex-direction:column;}
.top{padding:1.2rem 2rem;border-bottom:1px solid #222;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-box{width:32px;height:32px;background:#FF9900;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#111;}
.logo-name{font-size:16px;font-weight:600;color:#fff;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:2.5rem;width:100%;max-width:440px;}
h2{font-size:24px;font-weight:600;margin-bottom:0.5rem;}
.sub{font-size:14px;color:#666;margin-bottom:2rem;}
.form-group{margin-bottom:1.25rem;}
label{display:block;font-size:13px;color:#888;margin-bottom:6px;}
input{width:100%;padding:12px 14px;background:#161616;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;}
input:focus{outline:none;border-color:#FF9900;}
.plan-select{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem;}
.plan-opt{background:#161616;border:1px solid #333;border-radius:8px;padding:12px 8px;text-align:center;cursor:pointer;}
.plan-opt.active{border-color:#FF9900;background:#1a1000;}
.plan-opt-name{font-size:13px;font-weight:600;}
.plan-opt-price{font-size:12px;color:#666;margin-top:2px;}
.btn-submit{width:100%;padding:13px;background:#FF9900;color:#111;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:0.5rem;}
.btn-submit:hover{background:#e68a00;}
.login-link{text-align:center;margin-top:1.25rem;font-size:13px;color:#666;}
.login-link a{color:#FF9900;text-decoration:none;}
.trial-note{background:#1a1400;border:1px solid #2a2000;border-radius:8px;padding:10px 14px;font-size:12px;color:#888;margin-bottom:1.5rem;text-align:center;}
.trial-note span{color:#FF9900;}
</style>
</head>
<body>
<div class="top">
  <a href="/" class="logo">
    <div class="logo-box">OA</div>
    <div class="logo-name">ArbitrageAI Pro</div>
  </a>
</div>
<div class="main">
  <div class="card">
    <h2>Start your free trial</h2>
    <p class="sub">7 days free — no credit card required</p>
    <div class="trial-note">🎉 <span>7-day free trial</span> — cancel anytime, no questions asked</div>

    <label>Choose your plan</label>
    <div class="plan-select">
      <div class="plan-opt" onclick="selectPlan(this,'starter')"><div class="plan-opt-name">Starter</div><div class="plan-opt-price">$49/mo</div></div>
      <div class="plan-opt active" onclick="selectPlan(this,'pro')"><div class="plan-opt-name">Pro</div><div class="plan-opt-price">$79/mo</div></div>
      <div class="plan-opt" onclick="selectPlan(this,'agency')"><div class="plan-opt-name">Agency</div><div class="plan-opt-price">$129/mo</div></div>
    </div>

    <div class="form-group"><label>Full name</label><input type="text" placeholder="Muhammad Zaman" id="name"></div>
    <div class="form-group"><label>Email address</label><input type="email" placeholder="you@email.com" id="email"></div>
    <div class="form-group"><label>Password</label><input type="password" placeholder="Min 8 characters" id="password"></div>

    <button class="btn-submit" onclick="signup()">Start free trial →</button>

    <div class="login-link">Already have an account? <a href="/login">Sign in</a></div>
  </div>
</div>
<script>
let selectedPlan = 'pro';
function selectPlan(el, plan) {
  document.querySelectorAll('.plan-opt').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  selectedPlan = plan;
}
function signup() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (!name || !email || !password) { alert('Please fill in all fields!'); return; }
  if (password.length < 8) { alert('Password must be at least 8 characters!'); return; }
  alert('Thank you ' + name + '! Your free trial is starting. We will contact you at ' + email + ' with your login details.');
}
</script>
</body>
</html>

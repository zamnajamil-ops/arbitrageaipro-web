<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ArbitrageAI Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;flex-direction:column;}
.top{padding:1.2rem 2rem;border-bottom:1px solid #222;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-box{width:32px;height:32px;background:#FF9900;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#111;}
.logo-name{font-size:16px;font-weight:600;color:#fff;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:2.5rem;width:100%;max-width:400px;}
h2{font-size:24px;font-weight:600;margin-bottom:0.5rem;}
.sub{font-size:14px;color:#666;margin-bottom:2rem;}
.form-group{margin-bottom:1.25rem;}
label{display:block;font-size:13px;color:#888;margin-bottom:6px;}
input{width:100%;padding:12px 14px;background:#161616;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;}
input:focus{outline:none;border-color:#FF9900;}
.btn-submit{width:100%;padding:13px;background:#FF9900;color:#111;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-submit:hover{background:#e68a00;}
.signup-link{text-align:center;margin-top:1.25rem;font-size:13px;color:#666;}
.signup-link a{color:#FF9900;text-decoration:none;}
.forgot{text-align:right;margin-top:-0.75rem;margin-bottom:1rem;}
.forgot a{font-size:12px;color:#666;text-decoration:none;}
.forgot a:hover{color:#FF9900;}
</style>
</head>
<body>
<div class="top">
  <a href="/" class="logo">
    <div class="logo-box">OA</div>
    <div class="logo-name">ArbitrageAI Pro</div>
  </a>
</div>
<div class="main">
  <div class="card">
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your ArbitrageAI Pro account</p>
    <div class="form-group"><label>Email address</label><input type="email" placeholder="you@email.com" id="email"></div>
    <div class="form-group"><label>Password</label><input type="password" placeholder="Your password" id="password"></div>
    <div class="forgot"><a href="#">Forgot password?</a></div>
    <button class="btn-submit" onclick="login()">Sign in →</button>
    <div class="signup-link">Don't have an account? <a href="/signup">Start free trial</a></div>
  </div>
</div>
<script>
function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (!email || !password) { alert('Please enter your email and password!'); return; }
  window.location.href = '/dashboard';
}
</script>
</body>
</html>
